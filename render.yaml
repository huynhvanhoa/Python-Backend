services:
  - type: web
    name: python-backend
    env: python
    plan: free
    buildCommand: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
    startCommand: bash scripts/start_render.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ALLOW_INSECURE_ADMIN
        value: 'false'
      - key: BACKEND_CORS_ORIGINS
        value: 'http://localhost:3000'
      - key: LOG_LEVEL
        value: 'INFO'
